<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="nav">
        <a href="#" class="logo">
          <h1>Store</h1>
        </a>
        <div class="action-buttons">
          <button class="theme-toggle action-btn">
            <i class="fas fa-sun" id="light-icon"></i>
            <i class="fas fa-moon" id="dark-icon" style="display: none"></i>
          </button>
          <input
            type="text"
            name="search-product"
            id="search-product"
            placeholder="Search products...."
            style="display: none"
          />
          <button class="nav-search action-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
          <button class="cart action-btn">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-item-count">0</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Product Section -->

    <section class="products-section">
      <div class="section-header">
        <h1>Featured Products</h1>
        <div class="category-filter">
          <button class="filter-button active" data-filter="all">All</button>
          <button class="filter-button" data-filter="audio">Audio</button>
          <button class="filter-button" data-filter="wearables">
            Wearables
          </button>
          <button class="filter-button" data-filter="accessories">
            Accessories
          </button>
        </div>
      </div>

      <!-- Product Container -->
      <div class="product-grid"></div>
    </section>

    <div class="cart-modal" id="cartModal">
      <div class="cart-content">
        <div class="cart-header">
          <h3>Your Cart</h3>
          <button id="closeCart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
          <!-- Cart items will be added here -->
        </div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Total:</span>
            <span id="cartTotal">$0.00</span>
          </div>
          <button class="btn-primary" id="checkoutBtn">
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
